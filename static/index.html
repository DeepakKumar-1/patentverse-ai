<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PatentVerse AI — Prior-Art Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0E14;
    --panel:#11161F;
    --panel-2:#161D28;
    --line:#232B38;
    --teal:#2DE0C6;
    --teal-dim:#1A9E8C;
    --violet:#8B7CF6;
    --text:#E7ECF3;
    --text-dim:#8993A3;
    --risk-high:#FF6B6B;
    --risk-med:#FFB86B;
    --risk-low:#2DE0C6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:'Manrope',sans-serif;min-height:100vh;
    background-image:radial-gradient(circle at 15% 0%, rgba(139,124,246,0.08), transparent 40%),
                      radial-gradient(circle at 85% 20%, rgba(45,224,198,0.06), transparent 45%);
  }
  .wrap{max-width:920px;margin:0 auto;padding:52px 24px 90px;}

  header{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
  .mark{
    width:38px;height:38px;position:relative;flex-shrink:0;
    border:2px solid var(--teal);border-radius:50%;
  }
  .mark::after{
    content:"";position:absolute;inset:8px;border-radius:50%;
    border:2px solid var(--violet);border-top-color:transparent;border-right-color:transparent;
    animation:spin 3s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  h1{
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.55rem;
    margin:0;letter-spacing:-0.01em;
  }
  .tagline{color:var(--text-dim);font-size:0.95rem;margin:10px 0 40px;max-width:520px;line-height:1.5;}

  .panel{
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:32px;position:relative;overflow:hidden;
  }
  .panel::before{
    content:"";position:absolute;top:-40%;right:-20%;width:340px;height:340px;
    background:radial-gradient(circle, rgba(45,224,198,0.10), transparent 70%);
    pointer-events:none;
  }

  label{
    display:block;font-family:'Space Grotesk',sans-serif;font-weight:600;
    font-size:0.85rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;
    margin-bottom:10px;
  }
  textarea{
    width:100%;min-height:120px;resize:vertical;
    font-family:'Manrope',sans-serif;font-size:1rem;line-height:1.55;
    padding:16px;border-radius:10px;border:1.5px solid var(--line);
    background:var(--panel-2);color:var(--text);outline:none;
  }
  textarea::placeholder{color:#5B6472;}
  textarea:focus{border-color:var(--teal);}

  .date-row{display:flex;gap:16px;margin-top:20px;flex-wrap:wrap;}
  .date-field{flex:1;min-width:150px;}
  .date-field label{margin-bottom:8px;font-size:0.78rem;}
  input[type="text"]{
    width:100%;padding:11px 14px;border-radius:8px;border:1.5px solid var(--line);
    background:var(--panel-2);color:var(--text);font-family:'JetBrains Mono',monospace;
    font-size:0.9rem;outline:none;
  }
  input[type="text"]:focus{border-color:var(--teal);}
  input[type="text"]::placeholder{color:#5B6472;}

  .action-row{display:flex;justify-content:space-between;align-items:center;margin-top:26px;flex-wrap:wrap;gap:14px;}
  .hint{font-size:0.8rem;color:var(--text-dim);}

  button{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.95rem;
    background:linear-gradient(135deg, var(--teal), var(--violet));
    color:#0A0E14;border:none;border-radius:10px;
    padding:14px 30px;cursor:pointer;letter-spacing:0.01em;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  button:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px -8px rgba(45,224,198,0.5);}
  button:disabled{opacity:0.5;cursor:wait;transform:none;}

  #error{
    display:none;margin-top:18px;padding:13px 16px;border-radius:8px;
    background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);
    color:#FFA8A8;font-size:0.9rem;
  }

  .radar{
    display:none;width:64px;height:64px;margin:30px auto 0;position:relative;
  }
  .radar.show{display:block;}
  .radar::before, .radar::after{
    content:"";position:absolute;inset:0;border-radius:50%;
    border:1.5px solid var(--teal);opacity:0;
    animation:ripple 1.6s ease-out infinite;
  }
  .radar::after{animation-delay:0.8s;}
  @keyframes ripple{
    0%{transform:scale(0.3);opacity:0.8;}
    100%{transform:scale(1.8);opacity:0;}
  }

  #report-wrap{margin-top:36px;display:none;}
  #report-wrap h2{
    font-family:'Space Grotesk',sans-serif;font-size:0.85rem;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:0.08em;margin-bottom:16px;
  }
  #report{font-size:0.95rem;line-height:1.7;color:var(--text);}
  #report h1{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;color:var(--text);margin-top:0;}
  #report h2.section{
    font-family:'Space Grotesk',sans-serif;font-size:1rem;color:var(--teal);
    text-transform:none;letter-spacing:normal;margin-top:26px;margin-bottom:10px;
    border-left:3px solid var(--teal);padding-left:10px;
  }
  #report table{border-collapse:collapse;width:100%;margin:16px 0;font-size:0.85rem;}
  #report th, #report td{
    border:1px solid var(--line);padding:10px 12px;text-align:left;
    font-family:'JetBrains Mono',monospace;font-size:0.78rem;
  }
  #report th{background:var(--panel-2);color:var(--teal);font-weight:600;}
  #report td{color:var(--text-dim);}
  #report li{margin-left:1.2em;margin-bottom:4px;}

  footer{text-align:center;margin-top:50px;color:#4E5766;font-size:0.78rem;}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="mark"></div>
      <h1>PatentVerse AI</h1>
    </header>
    <p class="tagline">Describe your invention and let a Search → Analysis → Report agent pipeline scan for prior art in minutes.</p>

    <div class="panel">
      <label for="invention">Invention description</label>
      <textarea id="invention" placeholder="e.g. A smart water bottle that tracks hydration using a load-cell sensor and syncs to a phone app via Bluetooth..."></textarea>

      <div class="date-row">
        <div class="date-field">
          <label for="date-from">From (year)</label>
          <input type="text" id="date-from" placeholder="e.g. 2015" />
        </div>
        <div class="date-field">
          <label for="date-to">To (year)</label>
          <input type="text" id="date-to" placeholder="e.g. 2024" />
        </div>
      </div>

      <div class="action-row">
        <span class="hint">Date range optional — leave blank to search all years.</span>
        <button id="submit">Scan for prior art</button>
      </div>
      <div class="radar" id="radar"></div>
      <div id="error"></div>
    </div>

    <div id="report-wrap">
      <h2>Search report</h2>
      <div id="report"></div>
    </div>

    <footer>PatentVerse AI — automated first-pass signal, not legal advice.</footer>
  </div>

<script>
const btn = document.getElementById('submit');
const textarea = document.getElementById('invention');
const dateFrom = document.getElementById('date-from');
const dateTo = document.getElementById('date-to');
const errorBox = document.getElementById('error');
const reportWrap = document.getElementById('report-wrap');
const reportEl = document.getElementById('report');
const radar = document.getElementById('radar');

function renderMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let inTable = false;
  let tableRows = [];

  function flushTable() {
    if (!tableRows.length) return;
    const [headerLine, , ...bodyLines] = tableRows;
    const header = headerLine.split('|').map(s => s.trim()).filter(Boolean);
    html += '<table><thead><tr>' + header.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
    bodyLines.forEach(row => {
      const cells = row.split('|').map(s => s.trim()).filter(Boolean);
      html += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
    });
    html += '</tbody></table>';
    tableRows = [];
    inTable = false;
  }

  for (const raw of lines) {
    const line = raw.trim();
    if (line.startsWith('|')) { inTable = true; tableRows.push(line); continue; }
    if (inTable) flushTable();
    if (line.startsWith('# ')) html += `<h1>${line.slice(2)}</h1>`;
    else if (line.startsWith('## ')) html += `<h2 class="section">${line.slice(3)}</h2>`;
    else if (line.startsWith('- ')) html += `<li>${line.slice(2)}</li>`;
    else if (line.length) html += `<p>${line.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')}</p>`;
  }
  flushTable();
  return html;
}

btn.addEventListener('click', async () => {
  const invention = textarea.value.trim();
  errorBox.style.display = 'none';
  radar.classList.remove('show');
  reportWrap.style.display = 'none';

  if (!invention) {
    errorBox.textContent = 'Please describe your invention first.';
    errorBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Scanning…';
  radar.classList.add('show');

  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        invention,
        date_from: dateFrom.value.trim() || null,
        date_to: dateTo.value.trim() || null
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Something went wrong.');

    reportEl.innerHTML = renderMarkdown(data.report);
    reportWrap.style.display = 'block';
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Scan for prior art';
    radar.classList.remove('show');
  }
});
</script>
</body>
</html>
